name: "Terraform Lint, Security and OPA"

on:
  pull_request:
    branches:
      - main

jobs:
  terraform-checks:
    name: "Checks: TFLint, Checkov and OPA"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=terraform init

      - name: Run TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.50.0
      - run: tflint --chdir=terraform

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true 

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Run OPA Check
        run: |
          terraform -chdir=terraform plan -out=tfplan.binary
          terraform -chdir=terraform show -json tfplan.binary > tfplan.json
          opa exec --decision terraform/analysis/allow --bundle opa/ tfplan.json
