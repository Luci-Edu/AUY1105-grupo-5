name: Terraform Lint, Security and OPA

on:
  pull_request:
    branches:
      - main

jobs:
  tflint:
    name: Analisis estatico
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6

      - name: Init TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint

  checkov:
    name: Analisis de seguridad
    runs-on: ubuntu-latest
    needs: tflint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          soft_fail: true

  opa:
    name: Haz una comprobacion de OPA
    runs-on: ubuntu-latest
    needs: checkov

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest

      - name: Terraform Init
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: true
        run: terraform init -backend=false

      - name: Terraform Plan
        working-directory: terraform
        env:
          AWS_ACCESS_KEY_ID: dummy
          AWS_SECRET_ACCESS_KEY: dummy
          AWS_DEFAULT_REGION: us-east-1
          AWS_EC2_METADATA_DISABLED: true
        run: terraform plan -refresh=false -out=tfplan.binary

      - name: Terraform Show JSON
        working-directory: terraform
        run: terraform show -json tfplan.binary > tfplan.json

      - name: Evaluar politicas OPA
        run: opa eval --format pretty --data opa --input terraform/tfplan.json "data.policy.deny"